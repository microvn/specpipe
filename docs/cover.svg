<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 512" width="1280" height="512" role="img" aria-label="Agentpipe — spec-first multi-agent dev toolkit">
  <defs>
    <radialGradient id="fade" cx="50%" cy="48%" r="62%">
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <mask id="fademask"><rect width="1280" height="512" fill="url(#fade)"/></mask>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#E6EDF3" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2EE6A6" stop-opacity="0.15"/>
      <stop offset="65%" stop-color="#2EE6A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#36404a"/><stop offset="0.7" stop-color="#2f6d61"/><stop offset="1" stop-color="#2EE6A6"/></linearGradient>
    <clipPath id="round"><rect width="1280" height="512" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#round)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect width="1280" height="512" fill="#0D1117"/>
    <circle cx="920" cy="350" r="190" fill="url(#glow)"/>
    <rect width="1280" height="512" fill="url(#grid)" mask="url(#fademask)"/>

    <!-- kicker -->
    <text x="640" y="150" text-anchor="middle" font-size="14" letter-spacing="4.5" fill="#6E7681">SPEC-FIRST&#160;&#160;·&#160;&#160;<tspan fill="#E6EDF3">MULTI-AGENT</tspan>&#160;&#160;·&#160;&#160;DEV TOOLKIT</text>

    <!-- wordmark -->
    <text x="640" y="262" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="94" font-weight="800" letter-spacing="-3.2" fill="#E6EDF3">Agentpipe</text>

    <!-- continuous track threaded through every step -->
    <line x1="360" y1="350" x2="920" y2="350" stroke="url(#track)" stroke-width="2"/>

    <!-- step 1: spec -->
    <circle cx="360" cy="350" r="22" fill="#0D1117" stroke="#6E7681" stroke-width="1.5"/>
    <text x="360" y="356" text-anchor="middle" font-size="17" fill="#6E7681">1</text>
    <text x="360" y="402" text-anchor="middle" font-size="16" letter-spacing="0.5" fill="#6E7681">spec</text>

    <!-- step 2: code -->
    <circle cx="547" cy="350" r="22" fill="#0D1117" stroke="#6E7681" stroke-width="1.5"/>
    <text x="547" y="356" text-anchor="middle" font-size="17" fill="#6E7681">2</text>
    <text x="547" y="402" text-anchor="middle" font-size="16" letter-spacing="0.5" fill="#6E7681">code</text>

    <!-- step 3: tests -->
    <circle cx="733" cy="350" r="22" fill="#0D1117" stroke="#6E7681" stroke-width="1.5"/>
    <text x="733" y="356" text-anchor="middle" font-size="17" fill="#6E7681">3</text>
    <text x="733" y="402" text-anchor="middle" font-size="16" letter-spacing="0.5" fill="#6E7681">tests</text>

    <!-- step 4: pass (lit gate) -->
    <circle cx="920" cy="350" r="27" fill="none" stroke="#2EE6A6" stroke-opacity="0.16" stroke-width="6"/>
    <circle cx="920" cy="350" r="22" fill="#2EE6A6"/>
    <text x="920" y="357" text-anchor="middle" font-size="20" fill="#06281d">&#10003;</text>
    <text x="920" y="402" text-anchor="middle" font-size="16" letter-spacing="0.5" font-weight="600" fill="#2EE6A6">pass</text>
  </g>

  <rect x="0.5" y="0.5" width="1279" height="511" rx="14" fill="none" stroke="#21262D"/>
</svg>
